<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رحلة عبور جسر الكرامة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --palestinian-color: #009639;
            --israeli-color: #0038a8;
            --jordanian-color: #ce1126;
            --primary-text: #2c3e50;
            --secondary-text: #7f8c8d;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border-light: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-palestinian: linear-gradient(135deg, #009639 0%, #00b04f 100%);
            --gradient-israeli: linear-gradient(135deg, #0038a8 0%, #1e5bc7 100%);
            --gradient-jordanian: linear-gradient(135deg, #ce1126 0%, #e63946 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            direction: rtl;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--primary-text);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-white);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            text-align: center;
            font-size: clamp(1.25rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--primary-text);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--palestinian-color), var(--jordanian-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-container {
            background: var(--border-light);
            height: 8px;
            width: min(90%, 800px);
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: var(--gradient-palestinian);
            transition: var(--transition);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .main-container {
            flex: 1;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .timeline-wrapper {
            background: var(--bg-white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: min(95%, 1200px);
            position: relative;
            overflow: hidden;
        }

        .timeline-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--palestinian-color), var(--israeli-color), var(--jordanian-color));
        }

        .timeline {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            justify-items: center;
        }

        .timeline-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            padding: 1rem;
            border-radius: 15px;
            position: relative;
            min-height: 120px;
            justify-content: center;
        }

        .timeline-step:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-md);
        }

        .timeline-step.active {
            background: var(--bg-light);
            box-shadow: var(--shadow-md);
        }

        .step-icon {
            font-size: 2.5rem;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            border: 3px solid var(--border-light);
            margin-bottom: 0.75rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .timeline-step.active .step-icon,
        .timeline-step.completed .step-icon {
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow-md);
        }

        .timeline-step.palestinian-phase .step-icon {
            background: var(--gradient-palestinian);
        }

        .timeline-step.israeli-phase .step-icon {
            background: var(--gradient-israeli);
        }

        .timeline-step.jordanian-phase .step-icon {
            background: var(--gradient-jordanian);
        }

        .timeline-step-title {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--primary-text);
            line-height: 1.4;
        }

        .timeline-step.active .timeline-step-title {
            font-weight: 600;
        }

        .step-number {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary-text);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .content-container {
            background: var(--bg-white);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: min(95%, 900px);
            position: relative;
            overflow: hidden;
        }

        .content-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-palestinian);
            transition: var(--transition);
        }

        .content-container.israeli-phase::before {
            background: var(--gradient-israeli);
        }

        .content-container.jordanian-phase::before {
            background: var(--gradient-jordanian);
        }

        .step-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .nav-button {
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
            min-width: 120px;
            justify-content: center;
        }

        .nav-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .nav-button:active:not(:disabled) {
            transform: translateY(0);
        }

        #prevBtn {
            background: linear-gradient(135deg, var(--secondary-text), #95a5a6);
            color: white;
        }

        #nextBtn {
            background: var(--gradient-palestinian);
            color: white;
        }

        .nav-button:disabled {
            background: var(--border-light);
            color: var(--secondary-text);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .step-counter {
            background: var(--bg-light);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 500;
            color: var(--primary-text);
            font-size: 0.9rem;
        }

        .content-section {
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary-text);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .content-title::before {
            content: '';
            width: 4px;
            height: 40px;
            background: var(--gradient-palestinian);
            border-radius: 2px;
        }

        .content-text {
            font-size: 1.1rem;
            color: var(--primary-text);
            line-height: 1.8;
        }

        .content-text strong {
            color: var(--palestinian-color);
            font-weight: 600;
        }

        .content-text ul {
            margin: 1.5rem 0;
            padding-right: 1.5rem;
        }

        .content-text li {
            margin-bottom: 0.75rem;
            position: relative;
        }

        .content-text li::marker {
            color: var(--palestinian-color);
        }

        .cost-highlight {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            border-right: 4px solid #f39c12;
            margin: 1.5rem 0;
            font-weight: 500;
        }

        .phase-indicator {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .phase-indicator.palestinian-phase {
            background: var(--gradient-palestinian);
        }

        .phase-indicator.israeli-phase {
            background: var(--gradient-israeli);
        }

        .phase-indicator.jordanian-phase {
            background: var(--gradient-jordanian);
        }

        .footer {
            background: var(--bg-white);
            text-align: center;
            padding: 1.5rem;
            color: var(--secondary-text);
            border-top: 1px solid var(--border-light);
            font-size: 0.9rem;
        }

        /* Enhanced Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                padding: 1rem;
                gap: 1.5rem;
            }

            .timeline-wrapper,
            .content-container {
                padding: 1.5rem;
            }

            .timeline {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                gap: 1rem;
            }

            .step-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }

            .timeline-step-title {
                font-size: 0.8rem;
            }

            .content-title {
                font-size: 1.5rem;
            }

            .step-navigation {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 1rem;
            }

            .timeline {
                grid-template-columns: repeat(2, 1fr);
            }

            .timeline-wrapper,
            .content-container {
                padding: 1rem;
            }

            .step-icon {
                width: 50px;
                height: 50px;
                font-size: 1.8rem;
            }
        }

        /* Accessibility improvements */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>رحلة عبور جسر الكرامة خطوة بخطوة</h1>
        <div class="progress-container">
            <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </header>

    <main class="main-container">
        <div class="timeline-wrapper">
            <div class="timeline" role="tablist" aria-label="خطوات رحلة عبور جسر الكرامة"></div>
        </div>

        <div class="content-container">
            <div class="phase-indicator"></div>
            <div class="step-navigation">
                <button id="prevBtn" class="nav-button" aria-label="الخطوة السابقة">
                    ← السابق
                </button>
                <div class="step-counter">
                    <span id="currentStepNumber">1</span> من <span id="totalSteps">7</span>
                </div>
                <button id="nextBtn" class="nav-button" aria-label="الخطوة التالية">
                    التالي →
                </button>
            </div>
            <div class="content-section" role="tabpanel"></div>
        </div>
    </main>

    <footer class="footer">
        <p>هذا الموقع تعليمي وإرشادي – غير رسمي | تم التطوير بهدف تسهيل رحلة المسافرين</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const timeline = document.querySelector('.timeline');
            const progressBar = document.querySelector('.progress-bar');
            const contentSection = document.querySelector('.content-section');
            const contentContainer = document.querySelector('.content-container');
            const phaseIndicator = document.querySelector('.phase-indicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const currentStepNumber = document.getElementById('currentStepNumber');
            const totalSteps = document.getElementById('totalSteps');

            const stepsData = [
                {
                    title: "الوصول إلى أريحا",
                    icon: "🚗",
                    phase: "palestinian-phase",
                    phaseName: "الجانب الفلسطيني",
                    content: {
                        title: "المرحلة الأولى: الوصول إلى نقطة العبور في أريحا",
                        text: `
                            <p class="content-text">
                                عند وصولك إلى البوابة الرئيسية لمعبر جسر الكرامة، سيقوم موظف الأمن بإعطائك رقم دورك 
                                مكتوبًا على ورقة صغيرة. هذا الرقم مهم جداً لأنك ستحتاجه في المرحلة الرابعة عند ختم الجواز.
                            </p>
                            <div class="cost-highlight">
                                <strong>نصيحة مهمة:</strong> احتفظ بهذا الرقم في مكان آمن وسهل الوصول إليه
                            </div>
                        `
                    }
                },
                {
                    title: "قاعة معالجة الشنط",
                    icon: "🧳",
                    phase: "palestinian-phase",
                    phaseName: "الجانب الفلسطيني",
                    content: {
                        title: "المرحلة الثانية: قاعة معالجة الأمتعة والشنط",
                        text: `
                            <p class="content-text">
                                في هذه القاعة، ستحتاج لدفع رسوم نقل الأمتعة والشنط عبر الجسر:
                            </p>
                            <div class="cost-highlight">
                                <ul>
                                    <li><strong>رسوم الراكب:</strong> 26 شيكل لكل شخص</li>
                                    <li><strong>رسوم الشنطة:</strong> 6 شيكل لكل شنطة كبيرة</li>
                                    <li><strong>ملاحظة:</strong> الشنطة اليدوية (الهاند باج) لا تُحسب ضمن الرسوم</li>
                                </ul>
                            </div>
                            <p class="content-text">
                                <strong>مهم جداً:</strong> احتفظ بالإيصال الذي ستحصل عليه، فستحتاجه لاستلام شنطك في الجانب الأردني.
                            </p>
                        `
                    }
                },
                {
                    title: "دفع ضريبة المسافر",
                    icon: "💳",
                    phase: "palestinian-phase",
                    phaseName: "الجانب الفلسطيني",
                    content: {
                        title: "المرحلة الثالثة: دفع ضريبة المغادرة",
                        text: `
                            <p class="content-text">
                                في هذه المرحلة، تدفع ضريبة المغادرة الإجبارية لجميع المسافرين المغادرين عبر جسر الكرامة.
                            </p>
                            <div class="cost-highlight">
                                <strong>قيمة الضريبة:</strong> 178 شيكل لكل مسافر
                            </div>
                            <p class="content-text">
                                بعد الدفع، ستحصل على وصل ضريبة المغادرة. <strong>احتفظ بهذا الوصل جيداً</strong> 
                                فسوف يُطلب منك إبرازه في المراحل القادمة للتأكد من دفع الضريبة.
                            </p>
                        `
                    }
                },
                {
                    title: "ختم الجواز الفلسطيني",
                    icon: "📋",
                    phase: "palestinian-phase",
                    phaseName: "الجانب الفلسطيني",
                    content: {
                        title: "المرحلة الرابعة: ختم جواز السفر - الجانب الفلسطيني",
                        text: `
                            <p class="content-text">
                                في هذه المرحلة، ستنتظر في القاعة المخصصة حتى يتم النداء على رقمك 
                                الذي حصلت عليه في بداية الرحلة (المرحلة الأولى).
                            </p>
                            <ul class="content-text">
                                <li>انتبه جيداً للنداء على الأرقام</li>
                                <li>عند النداء على رقمك، توجه إلى الموظف المختص</li>
                                <li>سيتم ختم جواز سفرك بختم المغادرة الفلسطيني</li>
                                <li>بعد الختم، توجه إلى الحافلة المتجهة للجانب الإسرائيلي</li>
                            </ul>
                        `
                    }
                },
                {
                    title: "التفتيش الإسرائيلي",
                    icon: "🛂",
                    phase: "israeli-phase",
                    phaseName: "الجانب الإسرائيلي",
                    content: {
                        title: "المرحلة الخامسة: التفتيش والمعالجة - الجانب الإسرائيلي",
                        text: `
                            <p class="content-text">
                                في هذا الجانب، ستمر بعدة خطوات أمنية وإدارية:
                            </p>
                            <ul class="content-text">
                                <li><strong>تفتيش الأمتعة:</strong> مرر شنط اليد عبر جهاز الفحص الإلكتروني</li>
                                <li><strong>التفتيش الشخصي:</strong> مر عبر البوابة الإلكترونية للتفتيش</li>
                                <li><strong>معالجة الوثائق:</strong> ضع جواز السفر على الماكينة الإلكترونية</li>
                                <li><strong>استلام التصريح:</strong> ستحصل على ورقة تصريح خروج</li>
                                <li><strong>الختم النهائي:</strong> انتظر حتى يتم ختم ورقة التصريح</li>
                            </ul>
                            <p class="content-text">
                                <strong>ملاحظة:</strong> هذه المرحلة قد تستغرق وقتاً أطول حسب الازدحام والإجراءات الأمنية.
                            </p>
                        `
                    }
                },
                {
                    title: "الحافلة إلى الأردن",
                    icon: "🚌",
                    phase: "israeli-phase",
                    phaseName: "الجانب الإسرائيلي",
                    content: {
                        title: "المرحلة السادسة: الانتقال بالحافلة إلى الجانب الأردني",
                        text: `
                            <p class="content-text">
                                بعد إتمام الإجراءات الإسرائيلية، ستنتقل إلى الحافلة المخصصة لعبور الجسر:
                            </p>
                            <ul class="content-text">
                                <li>ضع الشنط الكبيرة في مخزن الحافلة السفلي</li>
                                <li>احتفظ بالشنطة اليدوية معك داخل الحافلة</li>
                                <li>اتبع تعليمات سائق الحافلة والمرافقين</li>
                                <li>الرحلة تستغرق حوالي 10-15 دقيقة عبر الجسر</li>
                            </ul>
                            <p class="content-text">
                                <strong>تنبيه:</strong> لا يُسمح بالنزول من الحافلة أو التصوير أثناء عبور الجسر.
                            </p>
                        `
                    }
                },
                {
                    title: "الوصول إلى الأردن",
                    icon: "🇯🇴",
                    phase: "jordanian-phase",
                    phaseName: "الجانب الأردني",
                    content: {
                        title: "المرحلة السابعة: الدخول والوصول - الجانب الأردني",
                        text: `
                            <p class="content-text">
                                هذه هي المرحلة الأخيرة من رحلتك. ستتم معالجة دخولك إلى الأردن من خلال:
                            </p>
                            <ul class="content-text">
                                <li><strong>تفتيش الأمتعة:</strong> مرر شنط اليد عبر البوابة الإلكترونية</li>
                                <li><strong>ختم الدخول:</strong> أبرز البطاقة الخضراء واختم جواز سفرك</li>
                                <li><strong>دفع الرسوم:</strong> ادفع ضريبة الدخول</li>
                                <li><strong>استلام الأمتعة:</strong> استلم شنطك من المخزن بالإيصالات</li>
                            </ul>
                            <div class="cost-highlight">
                                <strong>ضريبة الدخول الأردنية:</strong> 10 دنانير أردنية لكل مسافر
                            </div>
                            <p class="content-text">
                                <strong>تهانينا!</strong> لقد أتممت رحلة العبور بنجاح ووصلت إلى الأردن. 
                                تأكد من استلام جميع أمتعتك قبل مغادرة المعبر.
                            </p>
                        `
                    }
                }
            ];

            let currentStep = 0;

            // Initialize total steps counter
            totalSteps.textContent = stepsData.length;

            function createTimelineStep(step, index) {
                const stepDiv = document.createElement('div');
                stepDiv.classList.add('timeline-step', step.phase);
                stepDiv.setAttribute('role', 'tab');
                stepDiv.setAttribute('aria-selected', index === currentStep ? 'true' : 'false');
                stepDiv.setAttribute('tabindex', index === currentStep ? '0' : '-1');
                
                if (index === currentStep) {
                    stepDiv.classList.add('active');
                } else if (index < currentStep) {
                    stepDiv.classList.add('completed');
                }

                stepDiv.innerHTML = `
                    <div class="step-icon">
                        <span class="step-number">${index + 1}</span>
                        ${step.icon}
                    </div>
                    <div class="timeline-step-title">${step.title}</div>
                `;

                stepDiv.addEventListener('click', () => goToStep(index));
                stepDiv.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        goToStep(index);
                    }
                });

                return stepDiv;
            }

            function renderTimeline() {
                timeline.innerHTML = '';
                stepsData.forEach((step, index) => {
                    const stepElement = createTimelineStep(step, index);
                    timeline.appendChild(stepElement);
                });
            }

            function updateProgressBar() {
                const progress = (currentStep / (stepsData.length - 1)) * 100;
                progressBar.style.width = `${progress}%`;
                progressBar.setAttribute('aria-valuenow', Math.round(progress));

                // Update progress bar color based on current phase
                const currentPhase = stepsData[currentStep].phase;
                if (currentPhase === 'palestinian-phase') {
                    progressBar.style.background = 'var(--gradient-palestinian)';
                } else if (currentPhase === 'israeli-phase') {
                    progressBar.style.background = 'var(--gradient-israeli)';
                } else if (currentPhase === 'jordanian-phase') {
                    progressBar.style.background = 'var(--gradient-jordanian)';
                }
            }
            function updatePhaseIndicator() {
                const currentPhase = stepsData[currentStep].phase;
                const phaseName = stepsData[currentStep].phaseName;
                
                phaseIndicator.className = `phase-indicator ${currentPhase}`;
                phaseIndicator.textContent = phaseName;
                
                contentContainer.className = `content-container ${currentPhase}`;
            }

            function renderContent() {
                const step = stepsData[currentStep];
                
                contentSection.innerHTML = `
                    <h2 class="content-title">${step.content.title}</h2>
                    <div>${step.content.text}</div>
                `;

                // Update navigation buttons
                prevBtn.disabled = currentStep === 0;
                nextBtn.disabled = currentStep === stepsData.length - 1;
                
                // Update step counter
                currentStepNumber.textContent = currentStep + 1;

                // Update button text for last step
                if (currentStep === stepsData.length - 1) {
                    nextBtn.innerHTML = '✓ اكتمال الرحلة';
                } else {
                    nextBtn.innerHTML = 'التالي →';
                }

                // Update previous button text for first step
                if (currentStep === 0) {
                    prevBtn.innerHTML = '← البداية';
                } else {
                    prevBtn.innerHTML = '← السابق';
                }
            }

            function goToStep(stepIndex) {
                if (stepIndex >= 0 && stepIndex < stepsData.length) {
                    currentStep = stepIndex;
                    renderTimeline();
                    renderContent();
                    updateProgressBar();
                    updatePhaseIndicator();
                    
                    // Smooth scroll to content
                    contentContainer.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'nearest' 
                    });
                    
                    // Announce step change for screen readers
                    const announcement = `الخطوة ${currentStep + 1} من ${stepsData.length}: ${stepsData[currentStep].title}`;
                    announceToScreenReader(announcement);
                }
            }

            function announceToScreenReader(message) {
                const announcement = document.createElement('div');
                announcement.setAttribute('aria-live', 'polite');
                announcement.setAttribute('aria-atomic', 'true');
                announcement.className = 'sr-only';
                announcement.textContent = message;
                document.body.appendChild(announcement);
                
                setTimeout(() => {
                    document.body.removeChild(announcement);
                }, 1000);
            }

            // Navigation event listeners
            nextBtn.addEventListener('click', () => {
                if (currentStep < stepsData.length - 1) {
                    goToStep(currentStep + 1);
                }
            });

            prevBtn.addEventListener('click', () => {
                if (currentStep > 0) {
                    goToStep(currentStep - 1);
                }
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.target.closest('.timeline-step')) return; // Let timeline handle its own keyboard events
                
                switch(e.key) {
                    case 'ArrowLeft':
                        if (currentStep > 0) {
                            e.preventDefault();
                            goToStep(currentStep - 1);
                        }
                        break;
                    case 'ArrowRight':
                        if (currentStep < stepsData.length - 1) {
                            e.preventDefault();
                            goToStep(currentStep + 1);
                        }
                        break;
                }
            });

            // Swipe gesture support for mobile
            let startX = null;
            let startY = null;

            contentContainer.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            });

            contentContainer.addEventListener('touchend', (e) => {
                if (!startX || !startY) return;

                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const diffX = startX - endX;
                const diffY = startY - endY;

                // Only trigger swipe if horizontal movement is greater than vertical
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                    if (diffX > 0 && currentStep < stepsData.length - 1) {
                        // Swipe left (next step)
                        goToStep(currentStep + 1);
                    } else if (diffX < 0 && currentStep > 0) {
                        // Swipe right (previous step)
                        goToStep(currentStep - 1);
                    }
                }

                startX = null;
                startY = null;
            });

            // Auto-save progress to localStorage
            function saveProgress() {
                try {
                    localStorage.setItem('kerameh-bridge-progress', currentStep.toString());
                } catch (e) {
                    // Ignore localStorage errors
                }
            }

            function loadProgress() {
                try {
                    const saved = localStorage.getItem('kerameh-bridge-progress');
                    if (saved !== null) {
                        const savedStep = parseInt(saved, 10);
                        if (savedStep >= 0 && savedStep < stepsData.length) {
                            return savedStep;
                        }
                    }
                } catch (e) {
                    // Ignore localStorage errors
                }
                return 0;
            }

            // Add loading animation
            function showLoadingAnimation() {
                contentSection.style.opacity = '0.5';
                contentSection.style.transform = 'translateY(10px)';
                
                setTimeout(() => {
                    contentSection.style.opacity = '1';
                    contentSection.style.transform = 'translateY(0)';
                }, 150);
            }

            // Enhanced goToStep with loading animation
            const originalGoToStep = goToStep;
            goToStep = function(stepIndex) {
                showLoadingAnimation();
                setTimeout(() => {
                    originalGoToStep(stepIndex);
                    saveProgress();
                }, 100);
            };

            // Initialize the application
            function init() {
                // Load saved progress
                currentStep = loadProgress();
                
                // Initial render
                renderTimeline();
                renderContent();
                updateProgressBar();
                updatePhaseIndicator();
                
                // Add entrance animation
                setTimeout(() => {
                    document.body.style.opacity = '1';
                }, 100);

                // Announce initial state to screen readers
                const initialAnnouncement = `تطبيق رحلة عبور جسر الكرامة. ${stepsData.length} خطوات إجمالي. الخطوة الحالية: ${currentStep + 1}`;
                announceToScreenReader(initialAnnouncement);
            }

            // Start the application
            init();

            // Add some visual polish with intersection observer
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.style.animationPlayState = 'running';
                        }
                    });
                }, {
                    threshold: 0.1
                });

                // Observe timeline steps for animations
                setTimeout(() => {
                    document.querySelectorAll('.timeline-step').forEach(step => {
                        observer.observe(step);
                    });
                }, 500);
            }

            // Add print styles
            const printStyles = `
                @media print {
                    body { background: white !important; }
                    .header, .footer { background: white !important; box-shadow: none !important; }
                    .timeline-wrapper, .content-container { 
                        box-shadow: none !important; 
                        border: 1px solid #ddd !important; 
                    }
                    .step-navigation { display: none !important; }
                    .progress-bar::after { display: none !important; }
                }
            `;
            
            const styleSheet = document.createElement('style');
            styleSheet.textContent = printStyles;
            document.head.appendChild(styleSheet);
        });

        // Add service worker for offline functionality (optional)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // You can add a service worker here for offline functionality
                console.log('Service Worker support detected');
            });
        }
    </script>
</body>
</html>
